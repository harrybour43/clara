<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de F-Stop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #004494;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-left: 5px solid #0056b3;
            border-radius: 4px;
            font-size: 1.1rem;
            min-height: 50px;
        }
        .action-required {
            border-left-color: #d9534f;
            background-color: #fdf2f2;
            color: #c9302c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de F-Stop</h1>
    
    <label for="baseStop">F-Stop Base (Fotômetro):</label>
    <select id="baseStop">
        <option value="0">f/1.0</option>
        <option value="1">f/1.4</option>
        <option value="2">f/2.0</option>
        <option value="3">f/2.8</option>
        <option value="4">f/4.0</option>
        <option value="5">f/5.6</option>
        <option selected value="6">f/8.0</option>
        <option value="7">f/11</option>
        <option value="8">f/16</option>
        <option value="9">f/22</option>
        <option value="10">f/32</option>
        <option value="11">f/45</option>
    </select>

    <label for="tenths">Décimos de Ponto:</label>
    <select id="tenths">
        <option value="0">0/10</option>
        <option value="1">1/10</option>
        <option value="2">2/10</option>
        <option value="3">3/10</option>
        <option value="4">4/10</option>
        <option value="5">5/10</option>
        <option value="6">6/10</option>
        <option value="7">7/10</option>
        <option value="8">8/10</option>
        <option value="9">9/10</option>
    </select>

    <button onclick="calculateFStop()">Calcular Abertura</button>

    <div id="resultBox" class="result">
        Aguardando cálculo...
    </div>
</div>

<script>
    // Tabela de f-stops: Ponto Inteiro, 1º Terço, 2º Terço, Próximo Inteiro
    const fStops = [
        { f: '1.0', t1: '1.1', t2: '1.2', next: '1.4' },
        { f: '1.4', t1: '1.6', t2: '1.8', next: '2.0' },
        { f: '2.0', t1: '2.2', t2: '2.5', next: '2.8' },
        { f: '2.8', t1: '3.2', t2: '3.5', next: '4.0' },
        { f: '4.0', t1: '4.5', t2: '5.0', next: '5.6' },
        { f: '5.6', t1: '6.3', t2: '7.1', next: '8.0' },
        { f: '8.0', t1: '9.0', t2: '10', next: '11' },
        { f: '11', t1: '13', t2: '14', next: '16' },
        { f: '16', t1: '18', t2: '20', next: '22' },
        { f: '22', t1: '25', t2: '29', next: '32' },
        { f: '32', t1: '36', t2: '40', next: '45' },
        { f: '45', t1: '51', t2: '57', next: '64' }
    ];

    function calculateFStop() {
        const stopIndex = parseInt(document.getElementById('baseStop').value);
        const tenths = parseInt(document.getElementById('tenths').value);
        const resultBox = document.getElementById('resultBox');
        
        const stopData = fStops[stopIndex];
        let message = "";
        let isActionRequired = false;

        switch(tenths) {
            case 0:
            case 1:
                message = `Use o ponto inteiro: <strong>f/${stopData.f}</strong>`;
                break;
            case 2:
                message = `MEXE NA LUZ<br><br>Reduza a luz em 2/10 para usar <strong>f/${stopData.f}</strong> (Ponto inteiro menor) <br>OU<br>Aumente a luz em 1/10 para usar <strong>f/${stopData.t1}</strong> (Primeiro terço).`;
                isActionRequired = true;
                break;
            case 3:
            case 4:
                message = `Use o primeiro terço: <strong>f/${stopData.t1}</strong>`;
                break;
            case 5:
                message = `MEXE NA LUZ<br><br>Mude a luz 1/2 ponto para cima ou para baixo para usar um ponto inteiro (<strong>f/${stopData.f}</strong> ou <strong>f/${stopData.next}</strong>).`;
                isActionRequired = true;
                break;
            case 6:
            case 7:
                message = `Use o segundo terço: <strong>f/${stopData.t2}</strong>`;
                break;
            case 8:
                message = `MEXE NA LUZ<br><br>Reduza a luz em 1/10 para usar <strong>f/${stopData.t2}</strong> (Segundo terço) <br>OU<br>Aumente a luz em 2/10 para usar <strong>f/${stopData.next}</strong> (Ponto inteiro superior).`;
                isActionRequired = true;
                break;
            case 9:
                message = `Use o ponto inteiro superior: <strong>f/${stopData.next}</strong>`;
                break;
        }

        resultBox.innerHTML = message;
        
        if (isActionRequired) {
            resultBox.classList.add('action-required');
        } else {
            resultBox.classList.remove('action-required');
        }
    }
</script>

</body>
</html>
